services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: order-system-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  auth-service:
    build:
      context: .
      dockerfile: src/AuthService/Dockerfile
    container_name: auth-service
    ports:
      - "8086:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AuthDb: Data Source=/data/auth.db
      Auth__Issuer: ${AUTH_ISSUER:-OrderSystem.Auth}
      Auth__Audience: ${AUTH_AUDIENCE:-OrderSystem.Api}
      Auth__SigningKey: ${ORDER_SYSTEM_JWT_SIGNING_KEY}
      OAuth__Providers__google__Enabled: ${GOOGLE_OAUTH_ENABLED:-false}
      OAuth__Providers__google__ClientId: ${GOOGLE_CLIENT_ID:-}
      OAuth__Providers__google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      OAuth__Providers__google__RedirectUri: ${GOOGLE_REDIRECT_URI:-http://localhost:8086/api/auth/oauth/callback/google}
    volumes:
      - auth_data:/data

  order-service:
    build:
      context: .
      dockerfile: src/OrderService/Dockerfile
    container_name: order-service
    depends_on:
      - rabbitmq
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      ProductService__BaseUrl: http://product-service:8080
      ConnectionStrings__OrderDb: Data Source=/data/orders.db
      Auth__Enabled: ${ORDER_AUTH_ENABLED:-true}
      Auth__Issuer: ${AUTH_ISSUER:-OrderSystem.Auth}
      Auth__Audience: ${AUTH_AUDIENCE:-OrderSystem.Api}
      Auth__SigningKey: ${ORDER_SYSTEM_JWT_SIGNING_KEY}
    volumes:
      - order_data:/data

  product-service:
    build:
      context: .
      dockerfile: src/ProductService/Dockerfile
    container_name: product-service
    ports:
      - "8082:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ProductDb: Data Source=/data/products.db
      Auth__Enabled: ${PRODUCT_AUTH_ENABLED:-true}
      Auth__Issuer: ${AUTH_ISSUER:-OrderSystem.Auth}
      Auth__Audience: ${AUTH_AUDIENCE:-OrderSystem.Api}
      Auth__SigningKey: ${ORDER_SYSTEM_JWT_SIGNING_KEY}
    volumes:
      - product_data:/data

  inventory-service:
    build:
      context: .
      dockerfile: src/InventoryService/Dockerfile
    container_name: inventory-service
    depends_on:
      - rabbitmq
    ports:
      - "8083:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      ConnectionStrings__InventoryDb: Data Source=/data/inventory.db
      Auth__Enabled: ${INVENTORY_AUTH_ENABLED:-false}
      Auth__Issuer: ${AUTH_ISSUER:-OrderSystem.Auth}
      Auth__Audience: ${AUTH_AUDIENCE:-OrderSystem.Api}
      Auth__SigningKey: ${ORDER_SYSTEM_JWT_SIGNING_KEY}
    volumes:
      - inventory_data:/data

  payment-service:
    build:
      context: .
      dockerfile: src/PaymentService/Dockerfile
    container_name: payment-service
    depends_on:
      - rabbitmq
    ports:
      - "8084:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      ConnectionStrings__PaymentDb: Data Source=/data/payments.db
      Auth__Enabled: ${PAYMENT_AUTH_ENABLED:-false}
      Auth__Issuer: ${AUTH_ISSUER:-OrderSystem.Auth}
      Auth__Audience: ${AUTH_AUDIENCE:-OrderSystem.Api}
      Auth__SigningKey: ${ORDER_SYSTEM_JWT_SIGNING_KEY}
    volumes:
      - payment_data:/data

  shipping-service:
    build:
      context: .
      dockerfile: src/ShippingService/Dockerfile
    container_name: shipping-service
    depends_on:
      - rabbitmq
    ports:
      - "8085:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      ConnectionStrings__ShippingDb: Data Source=/data/shipping.db
      Auth__Enabled: ${SHIPPING_AUTH_ENABLED:-false}
      Auth__Issuer: ${AUTH_ISSUER:-OrderSystem.Auth}
      Auth__Audience: ${AUTH_AUDIENCE:-OrderSystem.Api}
      Auth__SigningKey: ${ORDER_SYSTEM_JWT_SIGNING_KEY}
    volumes:
      - shipping_data:/data

volumes:
  order_data:
  product_data:
  inventory_data:
  payment_data:
  shipping_data:
  auth_data:
